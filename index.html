<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#8b1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FBC Lerum">
<title>FBC Lerum Pre-Season</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --crimson:   #8b1a2e;
  --crimson2:  #6d1524;
  --gold:      #c9a84c;
  --dark:      #0a0a0a;
  --dark2:     #111111;
  --card:      #181818;
  --card2:     #1e1e1e;
  --border:    #2a2a2a;
  --text:      #f0ece8;
  --muted:     #6b6560;
  --green:     #4caf7d;
  --red:       #e8341a;
  --blue:      #3a8cc7;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: clip; width: 100%; }
body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100dvh;
  overflow-x: clip;
  width: 100%;
  max-width: 100vw;
}
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 120% 60% at 50% -10%, rgba(139,26,46,0.18) 0%, transparent 70%);
}

/* ── HEADER ───────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,0.96);
  border-bottom: 2px solid var(--crimson);
  backdrop-filter: blur(12px);
  padding: env(safe-area-inset-top, 0px) 0.75rem 0;
  display: flex; align-items: center; gap: 0.5rem;
  min-height: calc(52px + env(safe-area-inset-top,0px));
  flex-wrap: wrap;
  overflow: visible;
}
.hdr-logo {
  display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0;
}
.hdr-logo svg { width: 36px; height: 36px; }
.hdr-logo-text {
  font-family: 'Bebas Neue'; font-size: 1.2rem; letter-spacing: 0.12em;
  background: linear-gradient(135deg, #fff 30%, var(--gold) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.hdr-date {
  font-family: 'Barlow Condensed'; font-size: 0.65rem; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  flex: 1; text-align: center; min-width: 0; overflow: hidden;
  white-space: nowrap; text-overflow: ellipsis; padding: 0 0.25rem;
}
.hdr-actions {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 0.25rem; flex-shrink: 0;
}
.hdr-btn {
  width: 34px; height: 34px; border-radius: 6px;
  background: rgba(255,255,255,0.05); border: 1px solid var(--border);
  color: var(--text); cursor: pointer; font-size: 0.95rem;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
  text-decoration: none; flex-shrink: 0;
}
.hdr-btn:hover { background: rgba(139,26,46,0.2); border-color: var(--crimson); }
.hdr-btn.active { background: rgba(139,26,46,0.3); border-color: var(--crimson); color: #fff; }
#challengeBadge {
  position: absolute; top: 2px; right: 2px;
  background: var(--gold); color: #000; border-radius: 50%;
  font-size: 0.5rem; font-weight: 700; width: 14px; height: 14px;
  display: flex; align-items: center; justify-content: center;
}

/* ── HEADER NAV ROW ────────────────────────────────────── */
#headerNavRow {
  display: none;
  width: calc(100% + 1.5rem);
  margin: 0 -0.75rem;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--border);
}
#headerNavRow.visible { display: grid; }
.hnav-btn {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 0.1rem;
  padding: 0.35rem 0.1rem 0.3rem;
  background: none; border: none; border-right: 1px solid var(--border);
  cursor: pointer;
  font-family: 'Barlow Condensed'; font-weight: 700;
  font-size: 0.58rem; letter-spacing: 0.07em; text-transform: uppercase;
  color: var(--muted); transition: background 0.15s, color 0.15s;
}
.hnav-btn:last-child { border-right: none; }
.hnav-btn:hover { background: rgba(139,26,46,0.1); color: var(--text); }
.hnav-btn.active { color: var(--crimson); background: rgba(139,26,46,0.1); border-bottom: 2px solid var(--crimson); }
.hnav-icon { font-size: 0.9rem; line-height: 1; }

/* ── MAIN & PAGES ─────────────────────────────────────── */
main { position: relative; z-index: 1; }
.page { display: none; }
.page.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

/* ── DASHBOARD ────────────────────────────────────────── */
#page-dashboard {
  min-height: calc(100dvh - 52px - env(safe-area-inset-top,0px));
  padding: 0;
  padding-bottom: env(safe-area-inset-bottom,0px);
}

/* ── HOME GRID ────────────────────────────────────────── */
.home-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0.5rem;
  width: 100%; padding: 0.75rem; box-sizing: border-box;
  transition: all 0.3s ease;
}
.home-grid.expanded {
  grid-template-columns: 1fr 1fr;
  gap: 0.85rem;
  max-width: 520px; margin: 0 auto;
  padding: clamp(1rem,5vh,2rem) clamp(0.75rem,4vw,1.5rem);
}
.home-grid.section-open { display: none; }
.home-btn {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 0.85rem 0.5rem; cursor: pointer; display: flex;
  flex-direction: column; align-items: center; justify-content: center;
  gap: 0.4rem; transition: all 0.18s ease; position: relative;
  min-height: 80px;
}
.home-grid.expanded .home-btn {
  padding: clamp(1rem,4vw,1.5rem) 0.75rem;
  min-height: clamp(90px,18vw,130px);
}
.home-btn:hover, .home-btn:active, .home-btn.active {
  border-color: var(--crimson); background: rgba(139,26,46,0.12);
}
.home-btn-icon { font-size: clamp(1.4rem,5vw,2.2rem); line-height: 1; }
.home-btn-label {
  font-family: 'Bebas Neue'; font-size: clamp(0.62rem,2.5vw,0.82rem);
  letter-spacing: 0.1em; color: var(--text); text-transform: uppercase;
}

#dash-content {
  padding: 1rem; padding-bottom: calc(1.5rem + env(safe-area-inset-bottom,0px));
}
#dash-content.hidden { display: none; }

/* ── SECTION TITLE ────────────────────────────────────── */
.section-title {
  font-family: 'Bebas Neue'; font-size: 2rem; letter-spacing: 0.08em;
  color: var(--text); margin-bottom: 0.25rem; display: flex;
  align-items: center; gap: 0.5rem;
}
.section-title::after {
  content: ''; flex: 1; height: 2px;
  background: linear-gradient(90deg, var(--crimson), transparent);
}
.section-sub {
  font-family: 'Barlow Condensed'; font-size: 0.78rem; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  margin-bottom: 1.25rem;
}

/* ── CARDS ────────────────────────────────────────────── */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  padding: 1rem; margin-bottom: 0.75rem;
}
.card:last-child { margin-bottom: 0; }

/* ── BANNER (image 2 style) ───────────────────────────── */
.banner-bar {
  width: 100%; height: 48px; object-fit: cover;
  background: linear-gradient(90deg, #000 0%, #8b1a2e 35%, #5a0e1e 65%, #000 100%);
  display: flex; align-items: center; justify-content: center; gap: 0.75rem;
  flex-shrink: 0;
}
.banner-bar svg { height: 32px; opacity: 0.9; }
.banner-bar-text {
  font-family: 'Bebas Neue'; font-size: 1.25rem; letter-spacing: 0.15em;
  color: #fff;
}

/* ── PROGRAMMING ──────────────────────────────────────── */
.prog-date-nav {
  display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.85rem;
}
.prog-nav-btn {
  width: 2rem; height: 2rem; border-radius: 4px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
}
.prog-nav-btn:disabled { color: var(--border); cursor: default; }
.prog-date-label {
  font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.85rem;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--gold); flex: 1; text-align: center;
}
.prog-block {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  overflow: hidden; margin-bottom: 0.65rem;
}
.prog-block-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.65rem 0.85rem; cursor: pointer; user-select: none;
}
.prog-block-label {
  font-family: 'Bebas Neue'; font-size: 0.9rem; letter-spacing: 0.1em;
}
.prog-block-body {
  padding: 0 0.85rem 0.75rem;
  font-size: 0.85rem; line-height: 1.7;
  border-top: 1px solid var(--border);
}
.prog-block-body br { margin-bottom: 0.1rem; }
.prog-block-body strong { color: var(--text); font-weight: 700; }
.prog-block-body em { color: #c8c4c0; font-style: italic; }
.prog-block-body u { text-decoration: underline; text-underline-offset: 2px; }
.prog-block-body.collapsed { display: none; }

/* ── LOG ──────────────────────────────────────────────── */
.log-tabs {
  display: flex; gap: 0; border-bottom: 1px solid var(--border);
  margin-bottom: 1rem;
}
.log-tab {
  padding: 0.6rem 1rem; background: none; border: none;
  border-bottom: 3px solid transparent; cursor: pointer;
  font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.82rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  transition: color 0.15s;
}
.log-tab.active { border-bottom-color: var(--crimson); color: var(--text); }
.log-entry {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 0.5rem; overflow: hidden;
}
.log-entry-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.6rem 0.75rem; cursor: pointer; user-select: none;
}
.log-entry-body {
  display: none; padding: 0.5rem 0.75rem 0.75rem;
  font-size: 0.8rem; border-top: 1px solid var(--border);
}
.log-badge {
  font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.62rem;
  letter-spacing: 0.08em; text-transform: uppercase;
  border: 1px solid; border-radius: 3px; padding: 0.1rem 0.3rem; flex-shrink: 0;
}
.log-comment-box {
  margin-top: 0.5rem; background: var(--card2); border: 1px solid var(--border);
  border-radius: 4px; padding: 0.5rem 0.65rem;
  font-size: 0.75rem; color: var(--gold);
}
.log-comment-input {
  width: 100%; background: var(--card); border: 1px solid var(--border);
  border-radius: 4px; padding: 0.4rem 0.6rem; color: var(--text);
  font-family: 'Barlow'; font-size: 0.8rem; resize: none;
  margin-top: 0.35rem;
}

/* ── PRs ──────────────────────────────────────────────── */
.pr-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 0.45rem 0.75rem; background: var(--card);
  border: 1px solid rgba(74,175,125,0.2); border-radius: 4px; margin-bottom: 0.35rem;
  cursor: pointer; gap: 0.5rem;
}
.pr-row:hover { border-color: var(--green); }
.pr-name { font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.88rem; flex: 1; min-width: 0; }
.pr-val { font-family: 'Bebas Neue'; font-size: 1rem; color: var(--green); flex-shrink: 0; }

/* ── SET ROWS ──────────────────────────────────────────── */
  .set-rows-header {
    display: grid; grid-template-columns: 2rem 1fr 1fr 1fr 1.5rem;
    gap: 0.35rem; align-items: center;
    font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.65rem;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
    padding: 0 0.1rem; margin-bottom: 0.2rem;
  }
  .set-row {
    display: grid; grid-template-columns: 2rem 1fr 1fr 1fr 1.5rem;
    gap: 0.35rem; align-items: center; margin-bottom: 0.35rem;
  }
  .set-row-label { font-family: 'Bebas Neue'; font-size: 0.85rem; color: var(--muted); text-align: center; }
  .set-row input { padding: 0.4rem 0.5rem; background: var(--card2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.85rem; width: 100%; min-width: 0; }
  .set-row input:focus { outline: none; border-color: var(--crimson); }
  .del-set-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.85rem; padding: 0; }
  .del-set-btn:hover { color: var(--red); }

  /* ── TIMER ────────────────────────────────────────────── */
.timer-display {
  font-family: 'Bebas Neue'; font-size: clamp(3.5rem,18vw,6rem);
  letter-spacing: 0.05em; text-align: center; color: var(--text);
  line-height: 1; transition: color 0.2s;
}
.timer-display.warning { color: var(--red); animation: pulse 0.5s infinite; }
.timer-display.done-pulse { animation: bigpulse 0.4s 3; color: var(--green); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes bigpulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
.timer-label {
  font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.75rem;
  letter-spacing: 0.15em; text-transform: uppercase; text-align: center;
  color: var(--muted); margin-bottom: 0.25rem;
}
.timer-modes {
  display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center;
  margin-bottom: 1rem;
}
.timer-mode-btn {
  padding: 0.3rem 0.75rem; border-radius: 20px;
  border: 1px solid var(--border); background: none;
  font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
}
.timer-mode-btn.active {
  border-color: var(--crimson); background: rgba(139,26,46,0.2); color: var(--text);
}

/* ── MEMBERS ──────────────────────────────────────────── */
.member-card {
  display: flex; align-items: center; gap: 0.65rem;
  padding: 0.7rem 0.85rem; background: var(--card);
  border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 0.5rem; cursor: pointer; transition: border-color 0.15s;
}
.member-card:hover { border-color: var(--crimson); }
.member-avatar {
  width: 2.4rem; height: 2.4rem; border-radius: 50%;
  background: rgba(139,26,46,0.2); display: flex; align-items: center;
  justify-content: center; font-size: 1.2rem; flex-shrink: 0;
}

/* ── PROFILE MODAL ────────────────────────────────────── */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85); display: flex;
  align-items: center; justify-content: center; padding: 1rem;
}
.modal-box {
  background: var(--dark2); border: 1px solid var(--border); border-radius: 10px;
  width: 100%; max-width: 420px; overflow: hidden;
  max-height: 90dvh; overflow-y: auto;
}
.modal-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem; border-bottom: 1px solid var(--border);
}
.modal-title { font-family: 'Bebas Neue'; font-size: 1.2rem; letter-spacing: 0.08em; }
.modal-close { background: none; border: none; color: var(--text); font-size: 1.2rem; cursor: pointer; }
.modal-body { padding: 1rem; }

/* ── FORMS ────────────────────────────────────────────── */
.form-group { margin-bottom: 0.85rem; }
.form-label {
  display: block; font-family: 'Barlow Condensed'; font-weight: 700;
  font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 0.35rem;
}
.form-input {
  width: 100%; padding: 0.55rem 0.75rem; background: var(--card);
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--text); font-family: 'Barlow'; font-size: 0.88rem;
  transition: border-color 0.15s;
}
.form-input:focus { outline: none; border-color: var(--crimson); }
.form-input::placeholder { color: var(--muted); }
textarea.form-input { resize: vertical; min-height: 80px; }

/* ── BUTTONS ──────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.35rem; padding: 0.55rem 1rem; border-radius: 4px;
  font-family: 'Barlow Condensed'; font-weight: 700; font-size: 0.82rem;
  letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer;
  border: none; transition: all 0.15s; white-space: nowrap;
}
.btn-crimson { background: var(--crimson); color: #fff; }
.btn-crimson:hover { background: var(--crimson2); }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--muted); }
.btn-outline:hover { border-color: var(--crimson); color: var(--text); }
.btn-ghost { background: none; border: none; color: var(--muted); padding: 0.35rem 0.65rem; }
.btn-ghost:hover { color: var(--text); }
.btn-sm { padding: 0.3rem 0.65rem; font-size: 0.72rem; }
.btn-full { width: 100%; }

/* ── TOAST ────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: calc(1.5rem + env(safe-area-inset-bottom,0px));
  left: 50%; transform: translateX(-50%) translateY(2rem);
  background: rgba(20,20,20,0.95); border: 1px solid var(--border);
  border-radius: 6px; padding: 0.6rem 1rem; z-index: 999;
  font-family: 'Barlow Condensed'; font-weight: 600; font-size: 0.88rem;
  letter-spacing: 0.05em; color: var(--text); white-space: nowrap;
  opacity: 0; transition: all 0.3s ease; pointer-events: none;
  max-width: calc(100vw - 2rem); text-align: center;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ──────────────────────────────────────── */
.empty-state {
  text-align: center; padding: 2.5rem 1rem; color: var(--muted);
}
.empty-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
.empty-state p { font-size: 0.85rem; margin-bottom: 0.75rem; }

/* ── AMRAP COUNTER ────────────────────────────────────── */
#amrapCounter { display: none; margin-top: 0.75rem; }

/* ── SCROLLBAR ────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── ADMIN SESSION VIEW ───────────────────────────────── */
.admin-session-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  margin-bottom: 0.5rem; overflow: hidden;
}
.admin-session-header {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.6rem 0.75rem; cursor: pointer; user-select: none;
}
.admin-session-body {
  display: none; padding: 0 0.75rem 0.75rem; border-top: 1px solid var(--border);
}

@media (min-width: 400px) {
  .home-grid:not(.expanded) { gap: 0.65rem; padding: 1rem; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr-logo">
    <!-- FBC Lerum Panther Logo — running panther silhouette -->
    <svg viewBox="0 0 56 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:48px;height:34px;">
      <!-- Crimson background rectangle -->
      <rect x="8" y="8" width="46" height="28" rx="3" fill="#8b1a2e"/>
      <!-- Panther body — running silhouette -->
      <!-- Tail sweeping left -->
      <path d="M4 22 Q2 18 4 15 Q6 13 8 16 Q9 18 8 20Z" fill="#0f0f0f"/>
      <!-- Main body -->
      <path d="M8 19 Q12 14 18 15 Q22 13 27 9 Q31 6 36 8 Q41 9 43 13 Q44 17 41 19 Q38 21 37 25 Q36 30 39 33 Q37 34 35 33 Q33 29 34 24 Q32 31 29 33 Q27 34 28 31 Q29 27 27 23 Q24 18 19 20 Q15 22 12 19 Q10 21 8 19Z" fill="#0f0f0f"/>
      <!-- White outline on body (like the logo image) -->
      <path d="M8 19 Q12 14 18 15 Q22 13 27 9 Q31 6 36 8 Q41 9 43 13 Q44 17 41 19 Q38 21 37 25 Q36 30 39 33 Q37 34 35 33 Q33 29 34 24 Q32 31 29 33 Q27 34 28 31 Q29 27 27 23 Q24 18 19 20 Q15 22 12 19 Q10 21 8 19Z" fill="none" stroke="white" stroke-width="0.8" opacity="0.6"/>
      <!-- Eye -->
      <circle cx="40" cy="12" r="1.2" fill="white" opacity="0.9"/>
      <!-- Ear -->
      <path d="M37 8 Q39 5 41 7 Q39 9 37 8Z" fill="#0f0f0f"/>
    </svg>
    <span class="hdr-logo-text">FBC LERUM</span>
  </div>
  <div class="hdr-date" id="headerDate"></div>
  <div class="hdr-actions">
    <button class="hdr-btn" id="hdrHomeBtn" onclick="goHome()" title="Home">🏠</button>
    <button class="hdr-btn" id="hdrSyncBtn" onclick="syncAll()" title="Sync">⟳</button>
    <button class="hdr-btn" id="hdrProfileBtn" onclick="openProfileModal()" title="Profile" style="position:relative;">
      <span id="hdrProfileAvatar">👤</span>
    </button>
  </div>
  <!-- HEADER NAV ROW (visible when section is open) -->
  <div id="headerNavRow">
    <button class="hnav-btn" id="hnav-log" onclick="selectSection('log')"><span class="hnav-icon">📋</span>Log</button>

<script>
// FBC Lerum Pre-Season App — app.js
// ================================================================

const APP_VERSION = 'v1.0';

// ── CONFIG ──────────────────────────────────────────────────────
// Paste your Google Apps Script Web App URL here after deploying Code.gs:
let SCRIPT_URL = localStorage.getItem('fbc_script_url') || '';

// ── STATE ────────────────────────────────────────────────────────
let profile = JSON.parse(localStorage.getItem('fbc_profile') || 'null') || {
  name: '', firstName: '', lastName: '', avatar: '⚡', admin: false,
};
let state = JSON.parse(localStorage.getItem('fbc_state') || 'null') || {
  sessions: [], prs: [], attendance: {},
};
let program   = JSON.parse(localStorage.getItem('fbc_program') || '{}');
let members   = JSON.parse(localStorage.getItem('fbc_members') || '[]');
let currentSection = null;

// ── UTILITIES ────────────────────────────────────────────────────
function save() {
  localStorage.setItem('fbc_state',   JSON.stringify(state));
  localStorage.setItem('fbc_profile', JSON.stringify(profile));
}
function saveProgram() { localStorage.setItem('fbc_program', JSON.stringify(program)); }
function saveMembers() { localStorage.setItem('fbc_members', JSON.stringify(members)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

function localIso(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('sv-SE', { weekday:'short', month:'short', day:'numeric' });
}

let _toastTimer;
function showToast(msg, duration=2800) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), duration);
}

function xhrPost(url, body) {
  // Google Apps Script requires a specific approach:
  // 1. POST with text/plain (avoids CORS preflight)
  // 2. Must follow redirects (Apps Script redirects once)
  // 3. Use fetch with redirect:'follow' and mode:'cors'
  return fetch(url, {
    redirect: 'follow',
    method: 'POST',
    body: JSON.stringify(body),
  }).then(r => {
    const ct = r.headers.get('content-type') || '';
    return r.text().then(text => {
      if (!text || text.trim() === '') throw new Error('Tomt svar från server — kontrollera deployment');
      if (text.trimStart().startsWith('<')) throw new Error('Script returnerade HTML — deployment-inställningar fel. Kontrollera: Execute as=Me, Access=Anyone');
      try { return JSON.parse(text); }
      catch(e) { throw new Error('Ogiltigt JSON-svar: ' + text.substring(0, 120)); }
    });
  });
}

async function testConnection() {
  const urlEl = document.getElementById('pScriptUrl');
  const url = (urlEl?.value?.trim()) || SCRIPT_URL;
  const res = document.getElementById('connTestResult');
  if (!res) return;
  if (!url) {
    res.style.display = 'block';
    res.style.background = 'rgba(232,52,26,0.15)';
    res.style.color = '#f87171';
    res.textContent = '⚠ Ingen URL angiven.';
    return;
  }
  res.style.display = 'block';
  res.style.background = 'rgba(255,255,255,0.05)';
  res.style.color = 'var(--muted)';
  res.textContent = '⟳ Testar…';
  try {
    const postData = await xhrPost(url, { action: 'getProgram' });
    if (postData.error) {
      res.style.background = 'rgba(232,52,26,0.15)';
      res.style.color = '#f87171';
      res.textContent = '⚠ Script fel: ' + postData.error;
    } else if (postData.program && Object.keys(postData.program).length > 0) {
      const days = Object.keys(postData.program).length;
      const dates = Object.keys(postData.program).sort();
      res.style.background = 'rgba(74,207,125,0.15)';
      res.style.color = '#4ade80';
      res.textContent = '✓ OK! ' + days + ' dagar: ' + dates[0] + ' → ' + dates[dates.length-1] + '. Synkat!';
      SCRIPT_URL = url;
      localStorage.setItem('fbc_script_url', url);
      program = postData.program;
      saveProgram();
      if (urlEl) urlEl.style.borderColor = '#4ade80';
      if (currentSection === 'program') selectSection('program');
    } else {
      // Show full raw response for debugging
      const raw = JSON.stringify(postData);
      res.style.background = 'rgba(251,191,36,0.15)';
      res.style.color = '#fbbf24';
      res.textContent = '⚠ Inget program. Råsvar (' + raw.length + ' tecken): ' + raw.substring(0, 300);
    }
  } catch(err) {
    res.style.background = 'rgba(232,52,26,0.15)';
    res.style.color = '#f87171';
    res.textContent = '⚠ Fel: ' + err.message;
  }
}

function isAdmin() {
  return profile.admin ||
    (members.find(m => m.name === profile.name)?.admin === true) ||
    localStorage.getItem('fbc_admin') === 'true';
}

// ── DATE HEADER ──────────────────────────────────────────────────
function updateDate() {
  const now = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  const el = document.getElementById('headerDate');
  if (el) el.textContent = now.toLocaleDateString('sv-SE', opts);
}
updateDate();
setInterval(updateDate, 60000);

// ── NAVIGATION ───────────────────────────────────────────────────
const SECTIONS = {
  log:        { icon:'📋', label:'Log',      build: buildLog,        render: renderLog },
  program:    { icon:'📅', label:'Program',  build: buildProgram,    render: renderProgram },
  timer:      { icon:'⏱', label:'Timer',     build: buildTimer,      render: () => {} },
  prs:        { icon:'🏆', label:'PRs',       build: buildPRs,        render: renderPRs },
  members:    { icon:'👥', label:'Team',      build: buildMembers,    render: renderMembers },
  attendance: { icon:'📌', label:'Presence',  build: buildAttendance, render: renderAttendance },
  standings:  { icon:'🏑', label:'Board',     build: buildStandings,  render: renderStandings },
  admin:      { icon:'🔑', label:'Admin',     build: buildAdmin,      render: renderAdmin },
};

function selectSection(name) {
  const cfg = SECTIONS[name];
  if (!cfg) return;
  const grid    = document.getElementById('homeGrid');
  const dc      = document.getElementById('dash-content');
  const navRow  = document.getElementById('headerNavRow');

  grid.classList.remove('expanded');
  grid.classList.add('section-open');

  document.querySelectorAll('.home-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.hnav-btn').forEach(b => b.classList.remove('active'));
  const hbtn = document.getElementById('hbtn-' + name);
  const hnav = document.getElementById('hnav-' + name);
  if (hbtn) hbtn.classList.add('active');
  if (hnav) hnav.classList.add('active');
  if (navRow) navRow.classList.add('visible');

  currentSection = name;
  dc.classList.remove('hidden');
  dc.innerHTML = cfg.build();
  cfg.render();
  window.scrollTo(0, 0);
}

function goHome() {
  const grid = document.getElementById('homeGrid');
  const dc   = document.getElementById('dash-content');
  const nav  = document.getElementById('headerNavRow');
  grid.classList.remove('section-open');
  grid.classList.add('expanded');
  document.querySelectorAll('.home-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.hnav-btn').forEach(b => b.classList.remove('active'));
  if (nav) nav.classList.remove('visible');
  if (dc) { dc.classList.add('hidden'); dc.innerHTML = ''; }
  currentSection = null;
  window.scrollTo(0, 0);
}

// ── PROFILE MODAL ─────────────────────────────────────────────
function openProfileModal() {
  const registered = !!profile.name;
  const modal = document.getElementById('modalContainer');
  const closeBtn = registered ? '<button class="modal-close" onclick="closeModal(&apos;profileModal&apos;)">✕</button>' : '';
  const welcomeMsg = !registered ? '<p style="font-size:0.82rem;color:var(--muted);margin-bottom:1rem;">Välkommen till FBC Lerum! Ange ditt namn och Script URL.</p>' : '';
  const urlColor = SCRIPT_URL ? 'var(--green)' : '#f87171';
  const urlBg = SCRIPT_URL ? 'rgba(74,207,125,0.05)' : 'rgba(232,52,26,0.08)';
  const urlBorder = SCRIPT_URL ? 'rgba(74,207,125,0.3)' : 'rgba(232,52,26,0.4)';
  const urlLabel = SCRIPT_URL ? '✓ Script URL (URL inlagd)' : '⚠ Script URL saknas — krävs för synk';

  const avatarList = ['⚡','🏑','🦁','🔥','⚔️','🎯','💪','🏃','🥅','🦅','🐆','🌪️'];
  const avatarBtns = avatarList.map(a => {
    const isActive = (profile.avatar || '⚡') === a;
    const borderCol = isActive ? 'var(--crimson)' : 'var(--border)';
    return `<button onclick="document.querySelectorAll('.av-pick').forEach(b=>b.classList.remove('active'));this.classList.add('active');" class="av-pick${isActive?' active':''}" data-av="${a}" style="width:2.2rem;height:2.2rem;border-radius:6px;border:2px solid ${borderCol};background:var(--card);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;">${a}</button>`;
  }).join('');

  modal.innerHTML = `<div class="modal-overlay" id="profileModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">${registered ? 'Profil' : 'Skapa konto'}</span>
        ${closeBtn}
      </div>
      <div class="modal-body">
        ${welcomeMsg}
        <div class="form-group" style="background:${urlBg};border:1px solid ${urlBorder};border-radius:6px;padding:0.75rem;margin-bottom:0.85rem;">
          <label class="form-label" style="color:${urlColor};">${urlLabel}</label>
          <input class="form-input" id="pScriptUrl" type="url"
            placeholder="https://script.google.com/macros/s/.../exec"
            value="${SCRIPT_URL}"
            style="border-color:${urlBorder};">
          <div style="font-size:0.68rem;color:var(--muted);margin-top:0.3rem;">Klistra in din Apps Script Web App URL</div>
        </div>
        <div style="display:flex;gap:0.75rem;">
          <div class="form-group" style="flex:1;">
            <label class="form-label">Förnamn</label>
            <input class="form-input" id="pFirstName" placeholder="Anna" value="${profile.firstName || ''}">
          </div>
          <div class="form-group" style="flex:1;">
            <label class="form-label">Efternamn</label>
            <input class="form-input" id="pLastName" placeholder="Svensson" value="${profile.lastName || ''}">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Avatar</label>
          <div style="display:flex;flex-wrap:wrap;gap:0.4rem;">${avatarBtns}</div>
        </div>
        <button class="btn btn-crimson btn-full" onclick="saveProfile()">${registered ? 'Spara ändringar' : 'Skapa konto'}</button>
        <button class="btn btn-outline btn-full" style="margin-top:0.5rem;" onclick="testConnection()">🔌 Testa anslutning</button>
        <div id="connTestResult" style="margin-top:0.5rem;font-size:0.75rem;padding:0.5rem;border-radius:4px;display:none;word-break:break-all;line-height:1.5;"></div>
        ${registered ? '<button class="btn btn-ghost btn-full" style="margin-top:0.5rem;" onclick="confirmLogout()">Logga ut</button>' : ''}
      </div>
    </div>
  </div>`;

  if (registered) {
    setTimeout(() => {
      const overlay = document.getElementById('profileModal');
      if (overlay) overlay.addEventListener('click', e => { if (e.target.id === 'profileModal') closeModal('profileModal'); });
    }, 100);
  }
}


function saveProfile() {
  const fn = document.getElementById('pFirstName')?.value?.trim() || '';
  const ln = document.getElementById('pLastName')?.value?.trim() || '';
  if (!fn || !ln) { showToast('Ange för- och efternamn'); return; }

  const scriptInput = document.getElementById('pScriptUrl');
  if (scriptInput && scriptInput.value.trim()) {
    SCRIPT_URL = scriptInput.value.trim();
    localStorage.setItem('fbc_script_url', SCRIPT_URL);
  }

  const activePick = document.querySelector('.av-pick.active');
  const av = activePick?.dataset.av || profile.avatar || '⚡';
  const fullName = `${fn} ${ln}`;
  const isNew = !profile.name;

  profile.firstName = fn;
  profile.lastName = ln;
  profile.name = fullName;
  profile.avatar = av;
  save();
  updateHeaderProfile();

  if (isNew && SCRIPT_URL) {
    xhrPost(SCRIPT_URL, { action: 'registerMember', firstName: fn, lastName: ln, avatar: av })
      .then(data => {
        if (data.error) { showToast('⚠ Serverfel: ' + data.error, 5000); return; }
        showToast('✓ Registrerad!');
        fetchMembers();
        syncProgram();
      })
      .catch(err => {
        console.error('Register error:', err);
        showToast('⚠ Anslutningsfel — kontrollera Script URL', 5000);
      });
  } else {
    showToast('✓ Profil sparad');
  }
  closeModal('profileModal');
  applyAdminVisibility();
}

function confirmLogout() {
  if (confirm('Logga ut? All lokal data bevaras.')) {
    profile = { name:'', firstName:'', lastName:'', avatar:'⚡', admin: false };
    save();
    updateHeaderProfile();
    closeModal('profileModal');
    goHome();
    setTimeout(openProfileModal, 300);
  }
}

function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function updateHeaderProfile() {
  const btn = document.getElementById('hdrProfileAvatar');
  if (btn) btn.textContent = profile.avatar || '👤';
}

function applyAdminVisibility() {
  const admin = isAdmin();
  const hbtnAdmin = document.getElementById('hbtn-admin');
  const hnavAdmin = document.getElementById('hnav-admin');
  if (hbtnAdmin) hbtnAdmin.style.display = admin ? '' : 'none';
  if (hnavAdmin) hnavAdmin.style.display = admin ? '' : 'none';
}

// ── SYNC ────────────────────────────────────────────────────────
async function syncAll() {
  if (!SCRIPT_URL) {
    showToast('⚠ Ange Script URL i profilen');
    openProfileModal();
    return;
  }
  showToast('⟳ Synkroniserar…', 5000);
  try {
    await Promise.all([syncProgram(), fetchMembers(), cloudPull()]);
  } catch(e) {
    showToast('⚠ Synkfel — kontrollera URL och internetanslutning', 5000);
  }
}

async function syncProgram() {
  if (!SCRIPT_URL) { showToast('⚠ Ange Script URL i profilen'); return; }
  try {
    const data = await xhrPost(SCRIPT_URL, { action: 'getProgram' });
    if (data.error) { console.error('Program sync error:', data.error); showToast('⚠ Programfel: ' + data.error, 4000); return; }
    if (data.program && Object.keys(data.program).length > 0) {
      program = data.program;
      saveProgram();
      showToast('✓ Program synkat (' + Object.keys(program).length + ' dagar)');
      if (currentSection === 'program') selectSection('program');
    } else {
      showToast('⚠ Inget program hittades i kalkylarket', 4000);
    }
  } catch(e) { console.error('Sync program failed:', e); showToast('⚠ Synkfel: ' + e.message, 4000); }
}

async function fetchMembers() {
  if (!SCRIPT_URL) return;
  try {
    const data = await xhrPost(SCRIPT_URL, { action: 'getMembers' });
    if (data.error) { console.error('Members error:', data.error); return; }
    if (data.members) {
      members = data.members;
      saveMembers();
      // Update admin status
      const me = members.find(m => m.name === profile.name);
      if (me && me.admin) {
        profile.admin = true; save();
      }
      applyAdminVisibility();
      if (currentSection === 'members') renderMembers();
      // Update last seen
      if (profile.name) {
        xhrPost(SCRIPT_URL, { action: 'updateLastSeen', memberName: profile.name }).catch(() => {});
      }
    }
  } catch(e) { console.warn('Fetch members failed:', e); }
}

async function cloudPull() {
  if (!SCRIPT_URL || !profile.name) return;
  try {
    const data = await xhrPost(SCRIPT_URL, { action: 'cloudPull', memberName: profile.name });
    if (data.sessions) {
      // Merge — keep local items not on server
      const serverIds = new Set(data.sessions.map(s => String(s.id)));
      const localOnly = state.sessions.filter(s => !serverIds.has(String(s.id)));
      state.sessions = [...data.sessions, ...localOnly];
    }
    if (data.prs) {
      const serverIds = new Set(data.prs.map(p => String(p.id)));
      const localOnly = state.prs.filter(p => !serverIds.has(String(p.id)));
      state.prs = [...data.prs, ...localOnly];
    }
    save();
    if (currentSection === 'log') renderLog();
    if (currentSection === 'prs') renderPRs();
  } catch(e) { console.warn('Cloud pull failed:', e); }
}

async function cloudPush(type, item, deleted=false) {
  if (!SCRIPT_URL || !profile.name) return;
  try {
    await xhrPost(SCRIPT_URL, { action:'cloudPush', memberName:profile.name, type, item, deleted });
  } catch(e) { console.warn('Cloud push failed:', e); }
}

// ── LOG SECTION ──────────────────────────────────────────────────
let logTab = 'all';
function buildLog() {
  return `
  <div class="section-title">Log</div>
  <div style="display:flex;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.85rem;">
    <button class="btn btn-crimson btn-sm" onclick="openSessionModal()">+ Session</button>
    <button class="btn btn-outline btn-sm" onclick="openPRModal()">+ PR</button>
    <button class="btn btn-ghost btn-sm" onclick="cloudPull()">☁ Sync</button>
  </div>
  <div class="log-tabs">
    <button class="log-tab ${logTab==='all'?'active':''}" onclick="setLogTab('all')">Alla</button>
    <button class="log-tab ${logTab==='session'?'active':''}" onclick="setLogTab('session')">Sessions</button>
    <button class="log-tab ${logTab==='pr'?'active':''}" onclick="setLogTab('pr')">PRs</button>
  </div>
  <div id="logList"></div>`;
}
function renderLog() {
  const el = document.getElementById('logList');
  if (!el) return;
  const today = localIso(new Date());

  let items = [];
  if (logTab !== 'pr') {
    items.push(...state.sessions.map(s => ({ ...s, _type:'session' })));
  }
  if (logTab !== 'session') {
    items.push(...state.prs.map(p => ({ ...p, _type:'pr' })));
  }
  items.sort((a,b) => (b.date||'').localeCompare(a.date||''));

  if (!items.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div>
      <p>Inga loggade sessions än.</p>
      <button class="btn btn-crimson btn-sm" onclick="openSessionModal()">+ Logga session</button></div>`;
    return;
  }

  el.innerHTML = items.map((item, idx) => {
    const id = `lei_${idx}`;
    if (item._type === 'session') {
      return `<div class="log-entry">
        <div class="log-entry-header" onclick="toggleLogEntry('${id}')">
          <span class="log-badge" style="color:var(--crimson);border-color:var(--crimson);">${item.type||'SESSION'}</span>
          <span style="font-family:'Barlow Condensed';font-weight:700;font-size:0.9rem;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${item.name||'Session'}</span>
          <span style="font-size:0.72rem;color:var(--muted);flex-shrink:0;">${formatDate(item.date)}</span>
          <span style="color:var(--muted);font-size:0.7rem;flex-shrink:0;">▼</span>
        </div>
        <div class="log-entry-body" id="${id}">
          ${item.score ? `<div style="font-family:'Bebas Neue';font-size:1.2rem;color:var(--green);">Score: ${item.score}</div>` : ''}
          ${item.notes ? `<div style="font-size:0.8rem;color:var(--muted);margin-top:0.3rem;white-space:pre-wrap;">${item.notes}</div>` : ''}
          ${item.parts ? renderSessionParts(item.parts) : ''}
          <div style="display:flex;gap:0.5rem;margin-top:0.65rem;">

// ── PR LOOKUP ─────────────────────────────────────────────────
function getBestPR(movementName) {
  if (!movementName) return null;
  const name = movementName.toLowerCase().trim();
  let candidates = (state.prs || []).filter(p => p.movement && p.movement.toLowerCase() === name);
  if (!candidates.length) {
    candidates = (state.prs || []).filter(p => p.movement &&
      (p.movement.toLowerCase().includes(name) || name.includes(p.movement.toLowerCase())));
  }
  return candidates.sort((a,b) => b.value - a.value)[0] || null;
}

function calcKg(pct, movementName) {
  const pr = getBestPR(movementName);
  if (!pr) return null;
  return Math.round(pr.value * pct / 100 * 2) / 2;
}

// ── ENRICH TEXT ────────────────────────────────────────────────
// Highlights %, kg, and inserts calculated weights from PRs
function enrichText(html) {
  if (!html) return '';
  const parts = html.split(/(<[^>]+>)/);
  return parts.map(p => {
    if (p.startsWith('<')) return p;
    return p
      .replace(/(\d+(?:[.,]\d+)?)\s*%/g, '<span style="color:var(--gold);">$1%</span>')
      .replace(/(\d+(?:[.,]\d+)?)\s*kg/gi, '<span style="color:var(--green);">$1&thinsp;kg</span>');
  }).join('');
}

// ── SPLIT INTO PARTS ───────────────────────────────────────────
// Splits session text into [{label:'Part A', text:'...'}, ...]
function splitIntoParts(text) {
  if (!text) return [];
  // Normalize: replace <br> tags with newlines, then split
  const normalized = text.replace(/<br\s*\/?>/gi, '\n');
  const lines = normalized.split('\n');
  const plain = lines.map(l => l.replace(/<[^>]+>/g,'').trim());
  // Part header: "A.", "A:", "A)", "Part A", "PART A" — letter followed by . : )
  const partRe = /^(?:(?:Part|PART)\s+)?([A-Za-z])[.:)]/;
  const indices = [];
  plain.forEach((p,i) => { if (partRe.test(p)) indices.push(i); });
  if (!indices.length) return [{ label: null, text: text.trim() }];
  return indices.map((from, pi) => {
    const to = pi+1 < indices.length ? indices[pi+1] : lines.length;
    const chunk = lines.slice(from, to).join('\n').trim();
    const letter = plain[from].match(/^(?:(?:Part|PART)\s+)?([A-Za-z])[.:)]/)?.[1]?.toUpperCase() || String.fromCharCode(65+pi);
    return { label: 'Part ' + letter, text: chunk };
  });
}

// ── PARSE PART SCHEME ──────────────────────────────────────────
// Extracts sets, reps, pct%, movement name, and calculates weight from PR
function parsePartScheme(text) {
  if (!text) return { sets:null, reps:null, weight:null, movement:null, pct:null };
  // Normalize <br> to newlines before stripping HTML
  const normalized = text.replace(/<br\s*\/?>/gi, '\n');
  const lines = normalized.replace(/<[^>]+>/g,'').split('\n').map(l=>l.trim()).filter(Boolean);
  // Skip primer/warmup lines (negative %)
  const filtered = lines.filter(l => !/at\s+-\d+\s*%/.test(l));

  let sets=null, reps=null, pct=null, movement=null;

  // Sets × reps: "6x3", "5x1+2", "4x2+2"
  for (const l of filtered) {
    const m = l.match(/(\d+)\s*[xX×]\s*(\d+(?:[+]\d+)*)/);
    if (m) {
      const s = parseInt(m[1]);
      if (s <= 20) {
        sets = s;
        reps = m[2].split('+').map(Number).reduce((a,b)=>a+b,0);
        break;
      }
    }
  }

  // Percentage (10–100, non-range)
  for (const l of filtered) {
    if (/\d+[,.]\d*\s*[-–]\s*\d+[,.]\d*\s*%/.test(l)) continue; // range → skip
    const m = l.match(/(\d{2,3}(?:[,.]\d+)?)\s*%/);
    if (m) { const v=parseFloat(m[1].replace(',','.')); if(v>=10&&v<=100){pct=v;break;} }
  }

  // Movement name: from "% of 1RM <Movement>" or from line with lift keyword
  const liftRe = /snatch|clean|jerk|squat|deadlift|press|pull|curl|row|bench|lunge|thruster/i;
  for (const l of filtered) {
    const ofRm = l.match(/of\s+(?:\d+\s*)?RM\s+([A-Za-zÅÄÖåäö][A-Za-zÅÄÖåäö\s&+]*?)(?:\s*$)/i);
    if (ofRm) { movement=ofRm[1].trim(); break; }
  }
  if (!movement) {
    for (const l of filtered) {
      if (liftRe.test(l)) {
        movement = l.replace(/^\d+(?:[+]\d+)*\s*[xX*]\s*\d+(?:[+]\d+)*\s+at\s+/i,'')
                    .replace(/\d+[,.]?\d*\s*%\s*(?:of\s+(?:\d+\s*)?RM\s*)?/gi,'').trim();
        if (!liftRe.test(movement)) movement=null;
        else break;
      }
    }
  }

  const weight = (pct && movement) ? calcKg(pct, movement) : null;
  return { sets, reps, weight, movement, pct };
}

// ── SET ROW COUNTER ────────────────────────────────────────────
let _setRowCount = 0;

function _addSetRow(containerId, weight, reps) {
  _setRowCount++;
  const id = _setRowCount;
  const row = document.createElement('div');
  row.className = 'set-row';
  row.dataset.setId = id;
  row.innerHTML = '<div class="set-row-label">S' + id + '</div>'
    + '<input type="number" id="psw-' + id + '" placeholder="kg" step="0.5" min="0" value="' + (weight??'') + '">'
    + '<input type="number" id="psr-' + id + '" placeholder="reps" min="1" value="' + (reps??'') + '">'
    + '<input type="number" id="pse-' + id + '" placeholder="RPE" min="1" max="10" step="0.5">'
    + '<button class="del-set-btn" onclick="_removeSetRow(' + id + ',\''+containerId+'\')">&#x2715;</button>';
  document.getElementById(containerId)?.appendChild(row);
  _renumberSetRows(containerId);
}

function _removeSetRow(id, containerId) {
  document.querySelector('[data-set-id="'+id+'"')?.remove();
  _renumberSetRows(containerId);

function _renumberSetRows(containerId) {
  document.querySelectorAll('#'+containerId+' .set-row').forEach((r,i) => {
    const lbl = r.querySelector('.set-row-label');
    if (lbl) lbl.textContent = 'S'+(i+1);
  });
}

function _getSetRows(containerId) {
  const rows = [];
  document.querySelectorAll('#'+containerId+' .set-row').forEach(r => {
    const id = r.dataset.setId;
    rows.push({
      weight: parseFloat(document.getElementById('psw-'+id)?.value)||null,
      reps:   parseInt(document.getElementById('psr-'+id)?.value)||null,
      rpe:    parseFloat(document.getElementById('pse-'+id)?.value)||null,
    });
  });
  return rows.filter(r => r.weight || r.reps);
}

function savePartLogCurrent() {
  const p = window._partLogParams || {};
  savePartLog(p.sessionName||'', p.partLabel||'', p.dateStr||'', p.isStrength, p.cid||'partSetContainer');
}

function savePartLog(sessionName, partLabel, dateStr, isStrength, cid) {
  const notes = document.getElementById('partNotes')?.value?.trim() || '';
  let score = '';
  let setsData = null;

  if (isStrength) {
    setsData = _getSetRows(cid);
    if (!setsData.length) { showToast('Ange minst ett set'); return; }
    score = setsData.map(s => [s.weight&&s.weight+'kg', s.reps&&s.reps+'×', s.rpe&&'@RPE'+s.rpe].filter(Boolean).join(' ')).join(' | ');
  } else {
    score = document.getElementById('partScore')?.value?.trim() || '';
  }

  // Find or create session for this date
  let session = state.sessions.find(s => s.date===dateStr && s.name===sessionName);
  if (!session) {
    session = { id:uid(), name:sessionName, date:dateStr, type:isStrength?'Strength':'WOD', score:'', notes:'', parts:{} };
    state.sessions.unshift(session);
  }
  if (!session.parts) session.parts = {};
  const key = partLabel || 'Session';
  session.parts[key] = score + (notes ? ('\n'+notes) : '');
  if (setsData) session.parts[key+'_sets'] = JSON.stringify(setsData);

  // Update attendance
  if (!state.attendance[dateStr]) state.attendance[dateStr] = [];
  if (!state.attendance[dateStr].includes(profile.name)) state.attendance[dateStr].push(profile.name);

  save();
  cloudPush('session', session);
  closeModal('partLogModal');
  showToast('✓ ' + (partLabel||'Session') + ' sparad!');
  if (currentSection==='log') renderLog();
}

function buildPRs() {
  return `
  <div class="section-title">PRs</div>
  <div style="display:flex;gap:0.5rem;margin-bottom:0.85rem;">
    <button class="btn btn-crimson btn-sm" onclick="openPRModal()">+ Ny PR</button>
    <input id="prSearch" class="form-input" style="flex:1;max-width:180px;padding:0.35rem 0.6rem;font-size:0.82rem;" placeholder="Sök rörelse…" oninput="renderPRs()">
  </div>
  <div id="prList"></div>`;
}
function renderPRs() {
  const el = document.getElementById('prList');
  if (!el) return;
  const q = (document.getElementById('prSearch')?.value || '').toLowerCase();
  // Best PR per movement
  const best = {};
  state.prs.forEach(p => {
    const mv = p.movement;
    if (!best[mv] || p.value > best[mv].value) best[mv] = p;
  });
  const sorted = Object.values(best)
    .filter(p => !q || p.movement.toLowerCase().includes(q))
    .sort((a,b) => a.movement.localeCompare(b.movement));

  if (!sorted.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">🏆</div><p>Inga PRs loggade ännu.</p></div>`;
    return;
  }
  el.innerHTML = sorted.map(p => {
    const dv = p.unit==='s'
      ? (Math.floor(p.value/60)+':'+String(Math.round(p.value%60)).padStart(2,'0'))
      : p.value + (p.unit||'kg');
    return `<div class="pr-row" onclick="editPR('${p.id}')">
      <span class="pr-name">${p.movement}</span>
      <span style="font-size:0.68rem;color:var(--muted);flex-shrink:0;">${formatDate(p.date)}</span>
      <span class="pr-val">${dv}</span>
    </div>`;
  }).join('');
}
function editPR(id) {
  const p = state.prs.find(x => x.id === id);
  if (!p) return;
  openPRModal();
  setTimeout(() => {
    const m = document.getElementById('prMov');
    const v = document.getElementById('prVal');
    const u = document.getElementById('prUnit');
    const d = document.getElementById('prDate');
    if (m) m.value = p.movement;
    if (v) v.value = p.value;
    if (u) u.value = p.unit || 'kg';
    if (d) d.value = p.date;
    // Change save button to update
    const btn = document.querySelector('#prModal .btn-crimson');
    if (btn) {
      btn.textContent = 'Uppdatera PR';
      btn.onclick = () => {
        deletePR(id);
        setTimeout(savePR, 100);
      };
    }
  }, 50);
}

// ── TIMER ─────────────────────────────────────────────────────────
let timerMode='stopwatch', timerRunning=false, timerSeconds=0, timerInterval=null;
let timerCountdown=false, startCountdownEnabled=false, timerTotalSecs=600;
let emomInterval=1, tabataWork=20, tabataRest=10, tabataRounds=8;
let timerRound=1, timerPhase='work', timerTotalRounds=8;
let amrapRounds=0;

function buildTimer() {
  return `
  <div class="section-title">Timer</div>
  <div class="timer-modes">
    ${['stopwatch','countdown','emom','amrap','tabata'].map(m=>`
    <button class="timer-mode-btn ${m===timerMode?'active':''}" onclick="setTimerMode('${m}')">${m.toUpperCase()}</button>`).join('')}
  </div>

  <div style="text-align:center;padding:1rem 0;">
    <div class="timer-label" id="timerLabel">STOPWATCH</div>
    <div class="timer-display" id="timerDisplay">00:00</div>
    <div id="timerRoundInd" style="display:none;font-family:'Barlow Condensed';font-size:0.85rem;letter-spacing:0.08em;color:var(--muted);margin-top:0.25rem;text-align:center;"></div>
    <div id="amrapCounter" style="display:none;margin-top:0.75rem;">
      <div style="font-family:'Barlow Condensed';font-weight:700;font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.4rem;">ROUNDS COMPLETED</div>
      <div style="display:flex;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);">
        <div onclick="amrapDec()" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.85rem 0;cursor:pointer;border-right:1px solid var(--border);">
          <span style="font-family:'Bebas Neue';font-size:2rem;color:var(--muted);">−</span>
          <span style="font-size:0.6rem;color:var(--muted);font-family:'Barlow Condensed';font-weight:700;letter-spacing:0.1em;text-transform:uppercase;">Ta bort</span>
        </div>
        <div style="flex:1.2;text-align:center;padding:0.85rem 0;">
          <span id="amrapCount" style="font-family:'Bebas Neue';font-size:3rem;color:var(--crimson);display:block;line-height:1;">0</span>
          <span style="font-size:0.6rem;color:var(--muted);font-family:'Barlow Condensed';font-weight:700;letter-spacing:0.1em;text-transform:uppercase;">Rounds</span>
        </div>
        <div onclick="amrapInc()" style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0.85rem 0;cursor:pointer;border-left:1px solid var(--border);">
          <span style="font-family:'Bebas Neue';font-size:2rem;color:var(--crimson);">+</span>
          <span style="font-size:0.6rem;color:var(--crimson);font-family:'Barlow Condensed';font-weight:700;letter-spacing:0.1em;text-transform:uppercase;">Lägg till</span>
        </div>
      </div>
    </div>
  </div>

  <div id="timerInputs" style="display:none;margin-bottom:1rem;padding:0.75rem;background:var(--card);border-radius:6px;border:1px solid var(--border);">
  </div>

  <div style="display:flex;gap:0.5rem;justify-content:center;flex-wrap:wrap;">
    <button class="btn btn-crimson" id="timerStartBtn" onclick="timerToggle()">START</button>
    <button class="btn btn-outline" onclick="timerReset()">RESET</button>
    <button class="btn btn-outline ${startCountdownEnabled?'active':''}" onclick="toggleStartCountdown()" title="10s nedräkning">10s</button>
  </div>`;
}
function amrapInc() { amrapRounds++; const el=document.getElementById('amrapCount'); if(el) el.textContent=amrapRounds; }
function amrapDec() { if(amrapRounds>0){amrapRounds--;} const el=document.getElementById('amrapCount'); if(el) el.textContent=amrapRounds; }

function setTimerMode(m) {
  timerMode = m;
  timerReset();
  if (currentSection==='timer') selectSection('timer');
}
function toggleStartCountdown() {
  startCountdownEnabled = !startCountdownEnabled;
  const btn = document.querySelector('#timerStartBtn');
  showToast(startCountdownEnabled ? '10s nedräkning PÅ' : '10s nedräkning AV');
}
function timerToggle() {
  if (timerRunning || timerCountdown) {
    clearInterval(timerInterval); timerRunning=false; timerCountdown=false;
    document.getElementById('timerStartBtn').textContent='RESUME';
    return;
  }
  if (startCountdownEnabled && !timerRunning && timerSeconds===0) {
    timerCountdown=true;
    let cd=10;
    document.getElementById('timerDisplay').textContent='00:'+String(cd).padStart(2,'0');
    document.getElementById('timerLabel').textContent='STARTING IN…';
    document.getElementById('timerStartBtn').textContent='CANCEL';
    timerInterval=setInterval(()=>{
      cd--;
      if(cd<=0){ clearInterval(timerInterval); timerCountdown=false; timerStart(); return; }
      document.getElementById('timerDisplay').textContent='00:'+String(cd).padStart(2,'0');
      if(cd<=3) document.getElementById('timerDisplay').classList.add('warning');
    },1000);
    return;
  }
  timerStart();
}
function timerStart() {
  timerRunning=true;
  document.getElementById('timerDisplay').classList.remove('warning','done-pulse');
  document.getElementById('timerStartBtn').textContent='PAUSE';
  if(timerMode==='stopwatch') {
    document.getElementById('timerLabel').textContent='STOPWATCH';
    timerInterval=setInterval(()=>{ timerSeconds++; updateTimerDisplay(); },1000);
  } else if(timerMode==='countdown') {
    const mins=parseInt(document.getElementById('cdMins')?.value||10);
    const secs=parseInt(document.getElementById('cdSecs')?.value||0);
    if(timerSeconds===0) timerSeconds=(mins*60+secs);
    document.getElementById('timerLabel').textContent='COUNTDOWN';
    timerInterval=setInterval(()=>{
      timerSeconds--;
      updateTimerDisplay();
      const d=document.getElementById('timerDisplay');
      d.classList.toggle('warning',timerSeconds<=10&&timerSeconds>0);
      if(timerSeconds<=0){clearInterval(timerInterval);timerRunning=false;d.classList.add('done-pulse');d.classList.remove('warning');d.textContent='00:00';document.getElementById('timerStartBtn').textContent='START';}
    },1000);
  } else if(timerMode==='emom') {
    document.getElementById('timerLabel').textContent='EMOM';
    const intv=(parseInt(document.getElementById('emomInt')?.value||1))*60;
    const total=(parseInt(document.getElementById('emomRounds')?.value||10));
    timerTotalRounds=total; timerRound=1; timerSeconds=0;
    timerInterval=setInterval(()=>{
      timerSeconds++;
      updateTimerDisplay();
      if(timerSeconds>=intv){
        timerSeconds=0; timerRound++;
        if(timerRound>timerTotalRounds){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerDisplay').classList.add('done-pulse');return;}
        updateRoundInd();
      }
    },1000);
    updateRoundInd();
  } else if(timerMode==='amrap') {
    document.getElementById('timerLabel').textContent='AMRAP';
    const total=(parseInt(document.getElementById('amrapMins')?.value||8))*60;
    timerTotalSecs=total; if(timerSeconds===0) timerSeconds=total;
    timerInterval=setInterval(()=>{
      timerSeconds--;
      updateTimerDisplay();
      if(timerSeconds<=0){clearInterval(timerInterval);timerRunning=false;document.getElementById('timerDisplay').classList.add('done-pulse');}
    },1000);
  } else if(timerMode==='tabata') {
    document.getElementById('timerLabel').textContent='TABATA';
    tabataWork=parseInt(document.getElementById('tabWork')?.value||20);
    tabataRest=parseInt(document.getElementById('tabRest')?.value||10);
    timerTotalRounds=parseInt(document.getElementById('tabRounds')?.value||8);
    timerRound=1; timerPhase='work'; timerSeconds=tabataWork;
    updateRoundInd();
    timerInterval=setInterval(()=>{
      timerSeconds--;
      updateTimerDisplay();
      const d=document.getElementById('timerDisplay');
      d.classList.toggle('warning',timerSeconds<=3&&timerSeconds>0);
      if(timerSeconds<=0){
        if(timerPhase==='work'){timerPhase='rest';timerSeconds=tabataRest;}
        else{timerPhase='work';timerRound++;timerSeconds=tabataWork;if(timerRound>timerTotalRounds){clearInterval(timerInterval);timerRunning=false;d.classList.add('done-pulse');return;}}
        updateRoundInd();
      }
    },1000);
  }
}
function updateTimerDisplay() {
  const m=Math.floor(Math.abs(timerSeconds)/60);
  const s=Math.abs(timerSeconds)%60;
  const el=document.getElementById('timerDisplay');
  if(el) el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}
function updateRoundInd() {
  const el=document.getElementById('timerRoundInd');
  if(!el) return;
  if(timerMode==='emom') { el.style.display='block'; el.textContent=`Round ${timerRound} / ${timerTotalRounds}`; }
  else if(timerMode==='tabata') { el.style.display='block'; el.textContent=`Round ${timerRound}/${timerTotalRounds} · ${timerPhase==='work'?'WORK':'REST'}`; el.style.color=timerPhase==='work'?'var(--crimson)':'var(--green)'; }
  else el.style.display='none';
}
function timerReset() {
  clearInterval(timerInterval); timerRunning=false; timerCountdown=false;
  timerSeconds=0; timerRound=1; timerPhase='work'; amrapRounds=0;
  const d=document.getElementById('timerDisplay');
  if(d){d.textContent='00:00';d.classList.remove('warning','done-pulse');}
  const s=document.getElementById('timerStartBtn');
  if(s) s.textContent='START';
  const ri=document.getElementById('timerRoundInd');
  if(ri) ri.style.display='none';
  const ac=document.getElementById('amrapCount');
  if(ac) ac.textContent='0';
}

  }
  const medals = ['🥇','🥈','🥉'];
  el.innerHTML = `
  <div style="margin-bottom:0.75rem;">
    <div style="display:grid;grid-template-columns:2rem 1fr 4rem 4rem;gap:0.5rem;padding:0.3rem 0.5rem;font-family:'Barlow Condensed';font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);">
      <span>#</span><span>Spelare</span><span style="text-align:center;">Sessions</span><span style="text-align:center;">PRs</span>
    </div>
    ${ranked.map((m,i)=>`
    <div style="display:grid;grid-template-columns:2rem 1fr 4rem 4rem;gap:0.5rem;align-items:center;padding:0.6rem 0.5rem;background:${m.name===profile.name?'rgba(139,26,46,0.15)':'var(--card)'};border:1px solid ${m.name===profile.name?'var(--crimson)':'var(--border)'};border-radius:6px;margin-bottom:0.35rem;">
      <span style="font-family:'Bebas Neue';font-size:1rem;">${medals[i]||i+1}</span>
      <div style="display:flex;align-items:center;gap:0.5rem;min-width:0;">
        <span style="font-size:1rem;">${m.avatar}</span>
        <span style="font-family:'Barlow Condensed';font-weight:700;font-size:0.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${m.name}</span>
      </div>
      <span style="text-align:center;font-family:'Bebas Neue';font-size:1.1rem;color:var(--crimson);">${m.sessions}</span>
      <span style="text-align:center;font-family:'Bebas Neue';font-size:1.1rem;color:var(--green);">${m.prs}</span>
    </div>`).join('')}
  </div>`;
}

// ── ADMIN SECTION ─────────────────────────────────────────────────
function buildAdmin() {
  if (!isAdmin()) return `<div class="empty-state"><div class="empty-icon">🔒</div><p>Admin only</p></div>`;
  return `
  <div class="section-title">Admin</div>
  <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;">
    <button class="btn btn-outline btn-sm" onclick="adminLoadAllSessions()">⟳ Ladda alla sessions</button>
    <button class="btn btn-outline btn-sm" onclick="adminSyncMembers()">👥 Uppdatera lag</button>
  </div>
  <div id="adminContent">
    <div class="empty-state"><div class="empty-icon">🔑</div><p>Tryck "Ladda alla sessions" för att se teamets logg.</p></div>
  </div>`;
}
function renderAdmin() {}

async function adminLoadAllSessions() {
  if (!SCRIPT_URL) { showToast('Ange Script URL'); return; }
  const el = document.getElementById('adminContent');
  if (!el) return;
  el.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted);">Laddar…</div>';
  try {
    const data = await xhrPost(SCRIPT_URL, { action: 'adminGetAllSessions' });
    const sessions = data.sessions || [];
    if (!sessions.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>Inga sessions ännu.</p></div>';
      return;
    }
    // Group by member
    const byMember = {};
    sessions.forEach(s => {
      if (!byMember[s.member]) byMember[s.member] = [];
      byMember[s.member].push(s);
    });
    el.innerHTML = Object.keys(byMember).sort().map(name => `
    <div style="margin-bottom:1.25rem;">
      <div style="font-family:'Bebas Neue';font-size:1rem;letter-spacing:0.08em;color:var(--crimson);margin-bottom:0.5rem;padding-bottom:0.3rem;border-bottom:1px solid var(--border);">
        ${name} <span style="font-family:'Barlow Condensed';font-size:0.75rem;color:var(--muted);">${byMember[name].length} sessions</span>
      </div>
      ${byMember[name].sort((a,b)=>(b.date||'').localeCompare(a.date||'')).map((s,idx)=>{
        const sid = `adms_${name.replace(/\s/g,'_')}_${idx}`;
        return `<div class="admin-session-card">
          <div class="admin-session-header" onclick="adminToggleSession('${sid}')">
            <span class="log-badge" style="color:var(--crimson);border-color:var(--crimson);">${s.type||'SESSION'}</span>
            <span style="font-family:'Barlow Condensed';font-weight:700;font-size:0.85rem;flex:1;">${s.name||'Session'}</span>
            <span style="font-size:0.72rem;color:var(--muted);">${formatDate(s.date)}</span>
            <span style="font-size:0.7rem;color:var(--muted);">▼</span>
          </div>
          <div class="admin-session-body" id="${sid}">
            ${s.score?`<div style="font-family:'Bebas Neue';font-size:1.1rem;color:var(--green);margin-top:0.4rem;">Score: ${s.score}</div>`:''}
            ${s.notes?`<div style="font-size:0.8rem;color:var(--muted);margin-top:0.3rem;white-space:pre-wrap;">${s.notes}</div>`:''}
            ${s.parts?Object.entries(s.parts).map(([k,v])=>`
            <div style="margin-top:0.5rem;padding:0.4rem 0.6rem;background:var(--card2);border-radius:4px;">
              <div style="font-family:'Barlow Condensed';font-weight:700;font-size:0.72rem;color:var(--muted);">${k}</div>
              <div style="font-size:0.8rem;white-space:pre-wrap;">${v}</div>
              <div style="margin-top:0.35rem;">
                <textarea class="log-comment-input" id="cmt_${s.id}_${k.replace(/\s/g,'_')}" placeholder="Kommentar till ${k}…" rows="2"></textarea>
                <button class="btn btn-outline btn-sm" style="margin-top:0.25rem;" onclick="saveAdminComment('${s.id}','${k.replace(/'/g,"\\'")}','cmt_${s.id}_${k.replace(/\s/g,'_')}')">Spara kommentar</button>
              </div>
            </div>`).join(''):''}
            <div style="margin-top:0.6rem;">
              <div style="font-family:'Barlow Condensed';font-weight:700;font-size:0.72rem;color:var(--muted);margin-bottom:0.25rem;">Kommentar till hela sessionen</div>
              <textarea class="log-comment-input" id="cmt_${s.id}_session" placeholder="Kommentar till sessionen…" rows="2"></textarea>
              <button class="btn btn-outline btn-sm" style="margin-top:0.25rem;" onclick="saveAdminComment('${s.id}','session','cmt_${s.id}_session')">Spara kommentar</button>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`).join('');
    // Load existing comments
    adminLoadComments(sessions.map(s=>s.id));
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>Fel: ${e.message}</p></div>`;
  }
}

function adminToggleSession(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const open = el.style.display === 'block';
  el.style.display = open ? 'none' : 'block';
  const chev = el.previousElementSibling?.querySelector(':last-child');
  if (chev) chev.textContent = open ? '▼' : '▲';
}

async function saveAdminComment(sessionId, partKey, inputId) {
  const el = document.getElementById(inputId);
  const comment = el?.value?.trim();
  if (!comment) { showToast('Skriv en kommentar'); return; }
  if (!SCRIPT_URL) { showToast('Script URL saknas'); return; }
  try {
    await xhrPost(SCRIPT_URL, { action:'saveComment', sessionId, partKey, comment, adminName:profile.name });
    showToast('✓ Kommentar sparad!');
  } catch(e) { showToast('Fel: '+e.message); }
}

async function adminLoadComments(sessionIds) {
  if (!SCRIPT_URL) return;
  for (const sid of sessionIds) {
    try {
      const data = await xhrPost(SCRIPT_URL, { action:'getComments', sessionId:String(sid) });
      if (data.comments) {
        data.comments.forEach(c => {
          const inputId = `cmt_${sid}_${c.partKey.replace(/\s/g,'_')}`;
          const el = document.getElementById(inputId);
          if (el && !el.value) el.value = c.comment;
          // Show existing comment
          const commentBox = el?.nextElementSibling;
          if (commentBox) {
            const existing = el.parentElement.querySelector('.admin-existing-comment');
            if (!existing) {
              const div = document.createElement('div');
              div.className = 'log-comment-box admin-existing-comment';
              div.innerHTML = `<strong>${c.admin}:</strong> ${c.comment} <span style="font-size:0.65rem;color:var(--muted);">${c.ts}</span>`;
              el.parentElement.insertBefore(div, el);
            }
          }
        });
      }
    } catch(e) {}
  }
}

async function adminViewMemberLogs(memberName) {
  if (!SCRIPT_URL) { showToast('Script URL saknas'); return; }
  const modal = document.getElementById('modalContainer');
  modal.innerHTML = `
  <div class="modal-overlay" id="memberLogsModal">
    <div class="modal-box" style="max-width:480px;">
      <div class="modal-header">
        <span class="modal-title">${memberName} — Log & PRs</span>
        <button class="modal-close" onclick="closeModal('memberLogsModal')">✕</button>
      </div>
      <div style="display:flex;border-bottom:1px solid var(--border);">
        <button id="mlTab1" onclick="mlSwitch('sessions')" style="flex:1;padding:0.6rem;font-family:'Barlow Condensed';font-weight:700;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;background:none;border:none;border-bottom:2px solid var(--crimson);color:var(--text);cursor:pointer;">Sessions</button>
        <button id="mlTab2" onclick="mlSwitch('prs')" style="flex:1;padding:0.6rem;font-family:'Barlow Condensed';font-weight:700;font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;">PRs</button>
      </div>
      <div id="mlBody" style="padding:1rem;max-height:60dvh;overflow-y:auto;">
        <div style="text-align:center;padding:2rem;color:var(--muted);">Laddar…</div>
      </div>
    </div>
  </div>`;

  try {
    const data = await xhrPost(SCRIPT_URL, { action:'cloudPull', memberName });
    window._mlData = data;
    mlSwitch('sessions');
  } catch(e) {
    document.getElementById('mlBody').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><p>${e.message}</p></div>`;
  }
}
function mlSwitch(tab) {
  const t1=document.getElementById('mlTab1');
  const t2=document.getElementById('mlTab2');
  const b=document.getElementById('mlBody');
  if(!b) return;
  if(t1){t1.style.borderBottomColor=tab==='sessions'?'var(--crimson)':'transparent';t1.style.color=tab==='sessions'?'var(--text)':'var(--muted)';}
  if(t2){t2.style.borderBottomColor=tab==='prs'?'var(--crimson)':'transparent';t2.style.color=tab==='prs'?'var(--text)':'var(--muted)';}
  const d=window._mlData||{sessions:[],prs:[]};
  if(tab==='sessions'){
    const s=(d.sessions||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    if(!s.length){b.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>Inga sessions.</p></div>';return;}
    b.innerHTML=s.map((item,i)=>{
      const id=`mls_${i}`;
      return `<div class="log-entry">
        <div class="log-entry-header" onclick="toggleLogEntry('${id}')">
          <span class="log-badge" style="color:var(--crimson);border-color:var(--crimson);">${item.type||'SESSION'}</span>
          <span style="font-family:'Barlow Condensed';font-weight:700;font-size:0.85rem;flex:1;">${item.name||'Session'}</span>
          <span style="font-size:0.7rem;color:var(--muted);">${formatDate(item.date)}</span>
          <span style="color:var(--muted);font-size:0.7rem;">▼</span>
        </div>
        <div class="log-entry-body" id="${id}">
          ${item.score?`<div style="font-family:'Bebas Neue';font-size:1.1rem;color:var(--green);">Score: ${item.score}</div>`:''}
          ${item.notes?`<div style="font-size:0.8rem;color:var(--muted);white-space:pre-wrap;">${item.notes}</div>`:''}
          ${item.parts?Object.entries(item.parts).map(([k,v])=>'<div style="margin-top:0.4rem;padding:0.4rem;background:var(--card2);border-radius:4px;"><div style="font-size:0.7rem;color:var(--muted);">'+k+'</div><div style="font-size:0.8rem;">'+v+'</div></div>').join(''):''}
        </div>
      </div>`;}).join('');
  } else {
    const p=(d.prs||[]).sort((a,b)=>a.movement.localeCompare(b.movement));
    if(!p.length){b.innerHTML='<div class="empty-state"><div class="empty-icon">🏆</div><p>Inga PRs.</p></div>';return;}
    b.innerHTML=p.map(pr=>{
      const dv=pr.unit==='s'?(Math.floor(pr.value/60)+':'+String(Math.round(pr.value%60)).padStart(2,'0')):pr.value+(pr.unit||'kg');
      return `<div class="pr-row"><span class="pr-name">${pr.movement}</span><span class="pr-val">${dv}</span></div>`;
    }).join('');
  }
}

function adminSyncMembers() { fetchMembers().then(()=>showToast('✓ Lag uppdaterat')); }

// ── SERVICE WORKER ────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── STARTUP ───────────────────────────────────────────────────────
updateHeaderProfile();
applyAdminVisibility();
if (!profile.name) {
  setTimeout(openProfileModal, 600);
} else {
  setTimeout(() => { syncProgram(); fetchMembers(); cloudPull(); }, 2000);
}

</script>
